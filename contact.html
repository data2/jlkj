<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联系 · 觉澜科技工作室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #07080e;
            color: #e8ecf4;
            overflow-x: hidden;
            line-height: 1.6;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0c1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2.4rem;
            background: rgba(7, 8, 14, 0.7);
            backdrop-filter: blur(24px) saturate(1.6);
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4rem;
        }
        .navbar .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            color: #e8ecf4;
            flex-shrink: 0;
        }
        .navbar .brand .logo-mark {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #fff;
            font-weight: 800;
        }
        .nav-links {
            display: flex;
            gap: 3.2rem;
            list-style: none;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            transition: 0.25s;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: 0.3s;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
        }
        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }
        .nav-toggle {
            display: none;
            font-size: 1.4rem;
            color: #e8ecf4;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        .page-header {
            padding: 8rem 0 3rem;
            text-align: center;
        }
        .page-header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .page-header h1 .gradient {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p {
            color: #94a3b8;
            max-width: 520px;
            margin: 0.5rem auto 0;
        }

        .contact-section {
            padding: 2rem 0 6rem;
            display: flex;
            justify-content: center;
        }
        .contact-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 3.5rem 4rem;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }
        .contact-card .icon-big {
            font-size: 3.6rem;
            color: #818cf8;
            margin-bottom: 1.2rem;
        }
        .contact-card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }
        .contact-card p {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .contact-card .email-box {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 0.6rem 1.8rem 0.6rem 1.8rem;
            transition: 0.3s;
        }
        .contact-card .email-box:hover {
            border-color: rgba(99, 102, 241, 0.25);
            background: rgba(255, 255, 255, 0.06);
        }
        .contact-card .email-box i {
            color: #818cf8;
            font-size: 1.2rem;
        }
        .contact-card .email-box .email {
            font-size: 1.2rem;
            font-weight: 500;
            color: #e8ecf4;
            letter-spacing: 0.3px;
        }
        .contact-card .email-box .copy-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
        }
        .contact-card .email-box .copy-btn:hover {
            color: #a5b4fc;
            background: rgba(255, 255, 255, 0.04);
        }
        .contact-card .hint {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer {
            padding: 2.5rem 0;
            text-align: center;
            font-size: 0.85rem;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        .footer .brand-foot {
            font-weight: 600;
            color: #a5b4fc;
        }

        @media (max-width: 768px) {
            .navbar {
                justify-content: space-between;
                gap: 0;
                padding: 0.8rem 1.2rem;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                background: rgba(7, 8, 14, 0.96);
                backdrop-filter: blur(24px);
                padding: 1.5rem 2rem;
                border-radius: 1.5rem;
                border: 1px solid rgba(255, 255, 255, 0.06);
                position: absolute;
                top: 70px;
                right: 1rem;
                width: 200px;
                gap: 1rem;
                font-size: 1rem;
            }
            .nav-links.open {
                display: flex;
            }
            .nav-toggle {
                display: block;
            }
            .page-header h1 {
                font-size: 2.2rem;
            }
            .contact-card {
                padding: 2.5rem 1.8rem;
            }
            .contact-card .email-box {
                flex-wrap: wrap;
                justify-content: center;
                padding: 0.8rem 1.2rem;
            }
            .contact-card .email-box .email {
                font-size: 1rem;
            }
            .container {
                padding: 0 1.2rem;
            }
        }
        @media (max-width: 480px) {
            .contact-card .email-box .email {
                font-size: 0.9rem;
                word-break: break-all;
            }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <nav class="navbar">
        <a href="index.html" class="brand">
            <div class="logo-mark">觉</div>
            <span>觉澜科技工作室</span>
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">首页</a></li>
            <li><a href="services.html">服务</a></li>
            <li><a href="cases.html">案例</a></li>
            <li><a href="contact.html" class="active">联系</a></li>
        </ul>
        <div class="nav-toggle" id="navToggle">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1><span class="gradient">联系</span> 合作</h1>
            <p>有想法？有需求？欢迎随时沟通</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-card">
                <div class="icon-big"><i class="fas fa-envelope"></i></div>
                <h2>邮件联系</h2>
                <p>项目咨询、需求沟通、合作意向，欢迎邮件交流</p>

                <div class="email-box">
                    <i class="fas fa-envelope"></i>
                    <span class="email">xgant@126.com</span>
                    <button class="copy-btn" onclick="copyEmail()" title="复制邮箱">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>

                <div class="hint">
                    <i class="fas fa-clock" style="margin-right:6px;color:#6366f1;"></i>
                    工作日 24 小时内回复
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p><span class="brand-foot">觉澜科技工作室</span> · 技术开发工作室</p>
        </div>
    </footer>

    <script>
        // 粒子
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const count = 80;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            function createParticles() {
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3,
                        r: Math.random() * 1.6 + 0.6,
                        alpha: Math.random() * 0.4 + 0.1
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(165, 180, 252, ${p.alpha})`;
                    ctx.fill();
                });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 140) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(165, 180, 252, ${0.06 * (1 - dist / 140)})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', () => {
                resize();
                createParticles();
            });
            resize();
            createParticles();
            draw();
        })();

        // 移动端导航
        const toggle = document.getElementById('navToggle');
        const links = document.getElementById('navLinks');
        toggle.addEventListener('click', () => links.classList.toggle('open'));
        links.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => links.classList.remove('open'));
        });

        // 复制邮箱
        function copyEmail() {
            const email = 'xgant@126.com';
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(email).then(() => {
                    showCopyFeedback();
                }).catch(() => {
                    fallbackCopy(email);
                });
            } else {
                fallbackCopy(email);
            }
        }

        function fallbackCopy(text) {
            const input = document.createElement('input');
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showCopyFeedback();
        }

        function showCopyFeedback() {
            const btn = document.querySelector('.copy-btn');
            const icon = btn.querySelector('i');
            const original = icon.className;
            icon.className = 'fas fa-check';
            icon.style.color = '#4ade80';
            setTimeout(() => {
                icon.className = original;
                icon.style.color = '';
            }, 2000);
        }
    </script>

</body>
</html>
